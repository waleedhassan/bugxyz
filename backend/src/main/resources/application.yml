spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bugxyz
    username: bugxyz
    password: bugxyz_secret
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: default-dev-secret-key-change-in-production-min-32-characters!!
    access-expiration-ms: 3600000
    refresh-expiration-ms: 604800000
  upload-dir: ./uploads

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.bugxyz: DEBUG
    org.springframework.security: INFO
